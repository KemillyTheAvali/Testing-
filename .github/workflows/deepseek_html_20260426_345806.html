<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Pet - Интерактивный кот</title>
    <style>
        * {
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            -webkit-touch-callout: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            margin: 0;
            padding: 20px;
            font-family: 'Fuzzy Bubbles', cursive;
        }
        
        .container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            image-rendering: crisp-edges;
        }
        
        .container img {
            width: 100%;
            display: block;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .head-area {
            position: absolute;
            top: 5.82%;
            left: 17.50%;
            width: 49.57%;
            height: 29.13%;
            cursor: grab;
        }
        
        .head-area:active {
            cursor: grabbing;
        }
        
        .nose-area {
            position: absolute;
            top: 38.50%;
            left: 28%;
            width: 5.99%;
            height: 4.46%;
            cursor: pointer;
        }
        
        .info {
            text-align: center;
            margin-top: 30px;
            color: #FFEDAB;
            font-size: 14px;
        }
        
        .info p {
            margin: 5px 0;
        }
        
        @font-face {
            font-family: 'Fuzzy Bubbles';
            font-style: normal;
            font-weight: 400;
            src: url('https://fonts.gstatic.com/s/fuzzybubbles/v5/6qLGKZMbnQO6heRF6EJnpcIVE1h3iw.woff2') format('woff2');
        }
    </style>
</head>
<body>
    <div>
        <div class="container">
            <img alt="Cat" draggable="false" id="cat" src="https://vulkiri.art/assets/images/image05.gif?v=3bad14ce"/>
            <div class="head-area" id="headArea"></div>
            <div class="nose-area" id="noseArea"></div>
        </div>
    </div>

    <audio id="boopSound" preload="auto" src="https://cdn.jsdelivr.net/gh/meowmeo12893/stuff@main/sqek.mp3"></audio>

    <script>
        // Изображения кота
        const normalCat = "https://vulkiri.art/assets/images/image05.gif?v=3bad14ce";
        const petCatImg = "https://vulkiri.art/assets/images/image02.gif?v=3bad14ce";
        const boopCatImg = "https://vulkiri.art/assets/images/image06.gif?v=3bad14ce";
        
        // Элементы DOM
        const cat = document.getElementById("cat");
        const headArea = document.getElementById("headArea");
        const noseArea = document.getElementById("noseArea");
        const boopSound = document.getElementById("boopSound");
        
        // Настройка звука
        if (boopSound) {
            boopSound.volume = 0.4;
            boopSound.load(); // Принудительная загрузка аудио
        }
        
        // Предзагрузка всех изображений для плавной смены
        const preloadImages = [normalCat, petCatImg, boopCatImg];
        preloadImages.forEach(src => {
            const img = new Image();
            img.src = src;
            console.log("Предзагружено:", src);
        });
        
        // Функция поглаживания
        function petCat() {
            console.log("Погладили котика!");
            if (cat) cat.src = petCatImg;
        }
        
        // Функция тыка в нос (boop)
        function boopCat() {
            console.log("Тыкнули в нос! Писк!");
            if (cat) cat.src = boopCatImg;
            if (boopSound) {
                boopSound.currentTime = 0;
                boopSound.play().catch(err => console.log("Ошибка воспроизведения звука:", err));
            }
        }
        
        // Сброс к обычному состоянию
        function resetCat() {
            console.log("Сброс состояния котика");
            if (cat) cat.src = normalCat;
        }
        
        // Принудительная остановка всех анимаций при загрузке страницы
        window.addEventListener('load', function() {
            console.log("Страница загружена, котик готов!");
            resetCat();
        });
        
        // ---- НАЗНАЧЕНИЕ ОБРАБОТЧИКОВ ДЛЯ ОБЛАСТИ ГОЛОВЫ ----
        if (headArea) {
            // Мышь
            headArea.addEventListener('mousedown', petCat);
            headArea.addEventListener('mouseup', resetCat);
            headArea.addEventListener('mouseleave', resetCat);
            
            // Тач-устройства (телефоны/планшеты)
            headArea.addEventListener('touchstart', function(e) {
                e.preventDefault();
                petCat();
            });
            headArea.addEventListener('touchend', function(e) {
                e.preventDefault();
                resetCat();
            });
        }
        
        // ---- НАЗНАЧЕНИЕ ОБРАБОТЧИКОВ ДЛЯ ОБЛАСТИ НОСА ----
        if (noseArea) {
            // Мышь
            noseArea.addEventListener('mousedown', boopCat);
            noseArea.addEventListener('mouseup', resetCat);
            noseArea.addEventListener('mouseleave', resetCat);
            
            // Тач-устройства
            noseArea.addEventListener('touchstart', function(e) {
                e.preventDefault();
                boopCat();
            });
            noseArea.addEventListener('touchend', function(e) {
                e.preventDefault();
                resetCat();
            });
        }
        
        // Защита от перетаскивания и выделения
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());
        
        console.log("Интерактивный котик загружен! Гладь и тыкай!");
    </script>
</body>
</html>
